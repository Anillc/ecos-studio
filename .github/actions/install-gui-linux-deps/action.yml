name: Install GUI Linux Dependencies
description: Install Linux packages required by Electron GUI checks and packaging.

inputs:
  extra-packages:
    description: Additional apt packages to install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install packages
      shell: bash
      run: |
        packages=(
          libasound2-dev
          libatk-bridge2.0-dev
          libdrm-dev
          libfuse2
          libgbm-dev
          libgl1-mesa-dev
          libgtk-3-dev
          libayatana-appindicator3-dev
          libnotify-dev
          libnss3
          librsvg2-dev
          libwayland-dev
          libx11-dev
          libxcursor-dev
          libxi-dev
          libxkbcommon-dev
          libxrandr-dev
          libxss1
          libxtst-dev
        )

        if [[ -n "${{ inputs.extra-packages }}" ]]; then
          read -r -a extra_packages <<< "${{ inputs.extra-packages }}"
          packages+=("${extra_packages[@]}")
        fi

        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --fix-missing "${packages[@]}"
