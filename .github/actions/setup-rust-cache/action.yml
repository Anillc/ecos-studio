name: Setup Rust Cache
description: Setup stable Rust and cache Cargo artifacts when a Rust workspace is part of the build.

inputs:
  workspaces:
    description: Rust workspace paths for Swatinem/rust-cache.
    required: false
    default: ""
  cache-targets:
    description: Whether to cache target directories.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@1.95.0
      with:
        components: rustfmt

    - name: Cache Rust build artifacts
      if: ${{ inputs.workspaces != '' }}
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.workspaces }}
        cache-targets: ${{ inputs.cache-targets }}

    - name: Cache Rust build artifacts
      if: ${{ inputs.workspaces == '' }}
      uses: Swatinem/rust-cache@v2
      with:
        cache-targets: ${{ inputs.cache-targets }}
