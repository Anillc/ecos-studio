name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release (for example, v0.1.0-alpha.3)
        required: true

permissions:
  contents: write

jobs:
  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Check version
        id: version
        uses: ./.github/actions/check-version
        with:
          expected_tag: ${{ github.event.inputs.tag_name || github.ref_name }}

  build:
    name: Build AppImage
    needs: check-version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Install Linux GUI dependencies
        uses: ./.github/actions/install-gui-linux-deps
        with:
          extra-packages: >-
            git curl ca-certificates build-essential pkg-config
            python3 python3-venv python3-pip python3-dev
            cmake ninja-build tcl-dev
            libgflags-dev libgoogle-glog-dev libboost-all-dev libgtest-dev
            flex libeigen3-dev libunwind-dev libmetis-dev libgmp-dev bison
            libhwloc-dev libcurl4-openssl-dev libtbb-dev
            patchelf jq wget

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.12
          enable-cache: true

      - name: Prepare repository
        run: make setup

      - name: Build Electron release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: make build

      - name: Verify AppImage artifact
        run: |
          find -L build -type f -name '*.AppImage' | sort > /tmp/ecos-release-files.txt
          if [ ! -s /tmp/ecos-release-files.txt ]; then
            echo "ERROR: AppImage artifact not found in build/" >&2
            echo "Build contents:" >&2
            find -L build -maxdepth 4 -mindepth 1 -print | sed -n '1,200p' >&2
            exit 1
          fi

          echo "Built AppImage artifact:"
          cat /tmp/ecos-release-files.txt

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecos-studio-release
          if-no-files-found: error
          path: |
            build/**/*.AppImage

  release:
    name: Create Release
    needs: [check-version, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ecos-studio-release
          path: build/release

      - name: Determine tag version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL_TAG="${{ github.event.inputs.tag_name }}"
          else
            FULL_TAG="${GITHUB_REF_NAME}"
          fi
          TAG_VERSION="${FULL_TAG#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "full_tag=$FULL_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --output release-changelog.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate release notes
        run: |
          {
            echo "> [!WARNING]"
            echo "> **ECOS Studio** is still under rapid development. You can download the latest version from the [release page](https://github.com/openecos-projects/ecos-studio/releases) to try it out (The current release builds are produced on **Ubuntu 22.04**, so using an older Linux system may lead to compatibility issues. Additionally, ECOS Studio currently only supports the **x86_64** Linux platform.)."
            echo ">"
            echo ""
            cat release-changelog.md
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t ASSETS < <(find build/release -type f -name '*.AppImage' | sort)
          gh release create "${{ steps.version.outputs.full_tag }}" \
            --title "ECOS Studio ${{ steps.version.outputs.full_tag }}" \
            --notes-file release-notes.md \
            "${ASSETS[@]}"
