name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: read
    outputs:
      version: ${{ steps.filter.outputs.version }}
      gui: ${{ steps.filter.outputs.gui }}
      layout_viewer: ${{ steps.filter.outputs.layout_viewer }}
      build: ${{ steps.filter.outputs.build }}
      ci: ${{ steps.filter.outputs.ci }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Classify changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            version:
              - 'ecos/gui/default.nix'
              - 'ecos/gui/package.json'
              - 'ecos/gui/apps/*/package.json'
              - 'ecos/gui/packages/*/package.json'
            gui:
              - 'ecos/gui/apps/**'
              - 'ecos/gui/packages/**'
              - 'ecos/gui/package.json'
              - 'ecos/gui/pnpm-lock.yaml'
              - 'ecos/gui/pnpm-workspace.yaml'
              - 'ecos/gui/tailwind.config.ts'
            layout_viewer:
              - 'ecos/layout-viewer/**'
            build:
              - 'Makefile'
              - 'ecos/scripts/**'
            ci:
              - '.github/**'
            docs_only:
              - 'README.md'
              - 'docs/**'
              - 'ecos/README.md'
              - 'ecos/docs/**'

  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.gui == 'true' || needs.changes.outputs.version == 'true' || needs.changes.outputs.build == 'true' || needs.changes.outputs.ci == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version
        uses: ./.github/actions/check-version

  vue-tsc:
    name: Vue Typecheck
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.gui == 'true' || needs.changes.outputs.build == 'true' || needs.changes.outputs.ci == 'true' }}
    defaults:
      run:
        working-directory: ecos/gui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Vue
        run: pnpm run typecheck

  gui-tests:
    name: GUI Tests
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.gui == 'true' || needs.changes.outputs.build == 'true' || needs.changes.outputs.ci == 'true' }}
    defaults:
      run:
        working-directory: ecos/gui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GUI tests
        run: pnpm run test

  layout-viewer-rust:
    name: Layout Viewer Rust Checks
    runs-on: ubuntu-22.04
    needs: changes
    if: ${{ needs.changes.outputs.layout_viewer == 'true' || needs.changes.outputs.ci == 'true' }}
    defaults:
      run:
        working-directory: ecos/layout-viewer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-cache
        with:
          workspaces: ecos/layout-viewer

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --workspace

  build-appimage:
    name: Build AppImage
    needs: [changes, check-version, vue-tsc, gui-tests, layout-viewer-rust]
    if: >-
      ${{
        always() &&
        (needs.changes.outputs.gui == 'true' ||
         needs.changes.outputs.layout_viewer == 'true' ||
         needs.changes.outputs.version == 'true' ||
         needs.changes.outputs.build == 'true' ||
         needs.changes.outputs.ci == 'true') &&
        needs.check-version.result != 'failure' &&
        needs.vue-tsc.result != 'failure' &&
        needs.gui-tests.result != 'failure' &&
        needs.layout-viewer-rust.result != 'failure'
      }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Linux GUI dependencies
        uses: ./.github/actions/install-gui-linux-deps
        with:
          extra-packages: >-
            git curl ca-certificates build-essential pkg-config
            python3 python3-venv python3-pip python3-dev
            cmake ninja-build tcl-dev
            libgflags-dev libgoogle-glog-dev libboost-all-dev libgtest-dev
            flex libeigen3-dev libunwind-dev libmetis-dev libgmp-dev bison
            libhwloc-dev libcurl4-openssl-dev libtbb-dev
            patchelf jq wget

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-cache
        with:
          workspaces: ecos/layout-viewer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.12
          enable-cache: true

      - name: Prepare repository
        run: make setup

      - name: Build Electron release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: make build

      - name: Verify AppImage artifact
        run: |
          find -L build -type f -name '*.AppImage' | sort > /tmp/ecos-appimage-files.txt

          if [ ! -s /tmp/ecos-appimage-files.txt ]; then
            echo "ERROR: AppImage artifact not found in build/" >&2
            echo "Build contents:" >&2
            find -L build -maxdepth 4 -mindepth 1 -print | sed -n '1,200p' >&2
            exit 1
          fi

          echo "Found AppImage artifact:"
          cat /tmp/ecos-appimage-files.txt

      - name: Upload CI AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecos-studio-appimage-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            build/**/*.AppImage
